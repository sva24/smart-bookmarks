services:
  app:
    build: .
    container_name: smart-bookmarks
    restart: "on-failure"

    ports:
      - "8000:8000"

    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
  db:
    image: postgres:latest
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smart-bookmarks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:8.latest
    container_name: contacts_redis
    restart: always

    ports:
      - "6379:6379"

    volumes:
      - ./redis_data:/data
    command: redis-server